name: Build RetroShare (MSYS2)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'master'

jobs:
  build-msys2:
    name: Build on MSYS2 (windows-latest)
    runs-on: windows-latest
    permissions:
      actions: write
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout (no submodules)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Init submodules (exclude problematic OBS submodule)
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          # Initialize only the needed submodules. Skip 'build_scripts/OBS' which
          # contains a filename invalid on Windows (colon in path) and breaks checkout.
          git submodule update --init --depth 1 \
            libbitdht \
            libretroshare \
            openpgpsdk \
            retroshare-webui \
            supportlibs/cmark \
            supportlibs/jni.hpp \
            supportlibs/librnp \
            supportlibs/libsam3 \
            supportlibs/rapidjson \
            supportlibs/restbed \
            supportlibs/udp-discovery-cpp || true

      - name: Setup MSYS2 and install packages
        uses: msys2/setup-msys2@40677d36a502eb2cf0fb808cc9dec31bf6152638
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            wget
            p7zip
            gcc
            perl
            ruby
            doxygen
            cmake
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-libxslt
            mingw-w64-x86_64-xapian-core
            mingw-w64-x86_64-sqlcipher
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-ccmake
            mingw-w64-x86_64-rapidjson
            mingw-w64-x86_64-json-c
            mingw-w64-x86_64-libbotan
            mingw-w64-x86_64-asio

      - name: Build RetroShare (MSYS2 MinGW64)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          # use the qmake matching installed Qt (qt5)
          qmake-qt5.exe . -r -spec win32-g++ "CONFIG+=release" "CONFIG+=rs_autologin" "CONFIG+=no_rs_sam3" "CONFIG+=no_rs_sam3_libsam3"
          mingw32-make -j3

      - name: Collect build artifacts (executables / deploy)
        run: |
          set -e
          mkdir -p build_artifacts/deploy
          shopt -s globstar nullglob || true
          for d in **/deploy/*; do
            cp -r "$d" build_artifacts/deploy/ || true
          done
          for f in **/*.exe **/*.zip **/*.7z **/*.tar.gz **/*.msi; do
            if [ -f "$f" ]; then
              cp --parents "$f" build_artifacts/deploy/ || true
            fi
          done

      - name: Upload built artifact
        uses: actions/upload-artifact@v4
        with:
          name: retroshare-msys2-${{ github.event.inputs.branch }}
          path: build_artifacts/deploy/
          if-no-files-found: warn
